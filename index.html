<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DCA Trade Simulator</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&family=Syne:wght@400;600;700;800&display=swap');
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0a0c10; --surface: #111318; --surface2: #181c24;
    --border: rgba(255,255,255,0.07); --border2: rgba(255,255,255,0.12);
    --green: #00e5a0; --green2: rgba(0,229,160,0.12); --green3: rgba(0,229,160,0.05);
    --red: #ff4d6a; --red2: rgba(255,77,106,0.12); --red3: rgba(255,77,106,0.05);
    --blue: #4d9fff; --blue2: rgba(77,159,255,0.1);
    --amber: #ffb830; --text: #e8eaf0; --muted: #5a6070; --muted2: #8892a0;
    --font-mono: 'JetBrains Mono', monospace; --font-display: 'Syne', sans-serif;
  }
  body { background: var(--bg); color: var(--text); font-family: var(--font-mono); font-size: 13px; line-height: 1.6; }
  .app { padding: 24px; max-width: 1180px; margin: 0 auto; }
  .header { display: flex; align-items: baseline; gap: 16px; margin-bottom: 24px; padding-bottom: 16px; border-bottom: 1px solid var(--border); flex-wrap: wrap; }
  .header h1 { font-family: var(--font-display); font-size: 22px; font-weight: 800; color: var(--text); letter-spacing: -0.5px; }
  .header .sub { font-size: 11px; color: var(--muted); letter-spacing: 0.05em; text-transform: uppercase; }
  .badge { font-size: 10px; padding: 2px 8px; border-radius: 3px; background: var(--green2); color: var(--green); border: 1px solid rgba(0,229,160,0.2); font-weight: 600; letter-spacing: 0.05em; }
  .grid2 { display: grid; grid-template-columns: 310px 1fr; gap: 16px; align-items: start; }
  .panel { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 16px; }
  .panel-title { font-family: var(--font-display); font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; color: var(--muted); margin-bottom: 14px; }
  .field { margin-bottom: 12px; }
  .field label { display: block; font-size: 11px; color: var(--muted2); margin-bottom: 5px; text-transform: uppercase; letter-spacing: 0.05em; }
  .field input { width: 100%; background: var(--surface2); border: 1px solid var(--border2); border-radius: 5px; color: var(--text); font-family: var(--font-mono); font-size: 13px; font-weight: 500; padding: 7px 10px; outline: none; transition: border-color 0.2s; }
  .field input:focus { border-color: var(--blue); }
  .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .btn-run { width: 100%; margin-top: 16px; padding: 11px; background: var(--green); color: #000; border: none; border-radius: 5px; font-family: var(--font-display); font-weight: 800; font-size: 13px; letter-spacing: 0.05em; cursor: pointer; transition: opacity 0.2s; }
  .btn-run:hover { opacity: 0.85; }
  .stat-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 14px; }
  .stat { background: var(--surface2); border-radius: 6px; padding: 10px 12px; border: 1px solid var(--border); }
  .stat .lbl { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 4px; }
  .stat .val { font-size: 17px; font-weight: 600; }
  .stat .val.g { color: var(--green); } .stat .val.r { color: var(--red); }
  .stat .val.b { color: var(--blue); } .stat .val.a { color: var(--amber); }
  .stat .sub-val { font-size: 10px; color: var(--muted); margin-top: 2px; }
  .tabs { display: flex; gap: 4px; margin-bottom: 14px; flex-wrap: wrap; }
  .tab { padding: 5px 14px; border-radius: 5px; border: 1px solid var(--border); font-size: 11px; font-weight: 600; color: var(--muted); cursor: pointer; transition: all 0.15s; letter-spacing: 0.05em; text-transform: uppercase; background: transparent; }
  .tab.active { background: var(--blue2); color: var(--blue); border-color: rgba(77,159,255,0.3); }
  .tab:hover:not(.active) { border-color: var(--border2); color: var(--text); }
  .tab-content { display: none; }
  .tab-content.active { display: block; }

  /* Toolbar */
  .table-toolbar { display: flex; align-items: center; gap: 8px; margin-bottom: 12px; flex-wrap: wrap; }
  .toolbar-label { font-size: 11px; color: var(--muted2); font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; }
  .btn-tb { padding: 4px 12px; border-radius: 4px; font-family: var(--font-mono); font-size: 11px; font-weight: 600; cursor: pointer; border: 1px solid var(--border2); background: var(--surface2); color: var(--text); transition: all 0.15s; }
  .btn-tb:hover { background: rgba(255,255,255,0.06); }
  .btn-tb.all { border-color: rgba(0,229,160,0.35); color: var(--green); background: var(--green3); }
  .btn-tb.all:hover { background: rgba(0,229,160,0.14); }
  .btn-tb.none { border-color: rgba(255,77,106,0.35); color: var(--red); background: var(--red3); }
  .btn-tb.none:hover { background: rgba(255,77,106,0.14); }
  .btn-tb.long-only { border-color: rgba(0,229,160,0.2); color: var(--green); background: transparent; }
  .btn-tb.long-only:hover { background: var(--green3); }
  .btn-tb.short-only { border-color: rgba(255,77,106,0.2); color: var(--red); background: transparent; }
  .btn-tb.short-only:hover { background: var(--red3); }
  .fill-count { margin-left: auto; font-size: 11px; color: var(--muted); }
  .fill-count span { color: var(--amber); font-weight: 600; }

  /* Table */
  table { width: 100%; border-collapse: collapse; font-size: 12px; }
  th { font-size: 10px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--muted); font-weight: 600; padding: 6px 10px; text-align: right; border-bottom: 1px solid var(--border); }
  th:first-child { text-align: center; width: 44px; }
  th:nth-child(2) { text-align: left; }
  td { padding: 7px 10px; text-align: right; border-bottom: 1px solid rgba(255,255,255,0.03); font-weight: 500; transition: background 0.12s; }
  td:first-child { text-align: center; width: 44px; padding: 7px 6px; }
  td:nth-child(2) { text-align: left; }
  tr:hover td { background: rgba(255,255,255,0.025); }
  tr.row-filled-long td:nth-child(2) { color: var(--green); }
  tr.row-filled-short td:nth-child(2) { color: var(--red); }
  tr.row-unfilled { opacity: 0.35; }
  tr.row-unfilled td:first-child { opacity: 1 !important; }
  tr.row-unfilled:hover { opacity: 0.55; }
  tr.row-total td { background: rgba(255,255,255,0.025); font-weight: 700; border-top: 1px solid var(--border); }

  /* Custom checkbox */
  .chk { display: flex; align-items: center; justify-content: center; }
  .chk-box {
    width: 17px; height: 17px; border-radius: 4px; border: 1.5px solid var(--border2);
    background: var(--surface2); cursor: pointer; display: flex; align-items: center; justify-content: center;
    transition: all 0.15s; user-select: none;
  }
  .chk-box:hover { border-color: rgba(255,255,255,0.35); transform: scale(1.08); }
  .chk-box.on-long { background: var(--green2); border-color: var(--green); }
  .chk-box.on-short { background: var(--red2); border-color: var(--red); }
  .chk-box svg { display: none; pointer-events: none; }
  .chk-box.on-long svg, .chk-box.on-short svg { display: block; }

  .tag { display: inline-block; font-size: 9px; padding: 1px 5px; border-radius: 3px; font-weight: 700; letter-spacing: 0.05em; vertical-align: middle; margin-left: 4px; }
  .tag-l { background: var(--green2); color: var(--green); }
  .tag-s { background: var(--red2); color: var(--red); }
  .chart-wrap { position: relative; height: 250px; margin-top: 4px; }
  .sim-controls { display: flex; gap: 8px; align-items: center; margin-bottom: 14px; flex-wrap: wrap; }
  .sim-controls label { font-size: 11px; color: var(--muted2); }
  .sim-controls input { width: 130px; background: var(--surface2); border: 1px solid var(--border2); border-radius: 4px; color: var(--text); font-family: var(--font-mono); font-size: 12px; padding: 6px 8px; outline: none; }
  .sim-controls input:focus { border-color: var(--blue); }
  .btn-sim { padding: 6px 16px; background: var(--blue2); color: var(--blue); border: 1px solid rgba(77,159,255,0.25); border-radius: 4px; font-family: var(--font-mono); font-size: 12px; font-weight: 600; cursor: pointer; }
  .btn-sim:hover { background: rgba(77,159,255,0.18); }
  .result-box { background: var(--surface2); border-radius: 6px; padding: 12px 14px; border: 1px solid var(--border); margin-top: 10px; }
  .result-row { display: flex; justify-content: space-between; align-items: center; padding: 5px 0; border-bottom: 1px solid rgba(255,255,255,0.04); }
  .result-row:last-child { border-bottom: none; }
  .result-row .k { font-size: 11px; color: var(--muted2); }
  .result-row .v { font-weight: 600; font-size: 13px; }
  .v.g { color: var(--green); } .v.r { color: var(--red); } .v.b { color: var(--blue); } .v.a { color: var(--amber); }
  .warn { font-size: 11px; padding: 8px 12px; border-radius: 4px; background: rgba(255,184,48,0.08); border: 1px solid rgba(255,184,48,0.2); color: var(--amber); margin-top: 8px; }
  .liq-warn { background: rgba(255,77,106,0.08) !important; border-color: rgba(255,77,106,0.2) !important; color: var(--red) !important; }
  .sep { height: 1px; background: var(--border); margin: 8px 0; }
  .empty-msg { text-align: center; padding: 32px 16px; color: var(--muted); font-size: 12px; line-height: 2; }
  @media (max-width: 820px) { .grid2 { grid-template-columns: 1fr; } .stat-grid { grid-template-columns: repeat(2,1fr); } }
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <h1>DCA TRADE SIMULATOR</h1>
    <span class="badge">FUTURES</span>
    <span class="sub">Tick lệnh khớp → tính lãi/lỗ thực tế</span>
  </div>

  <div class="grid2">
    <div>
      <div class="panel">
        <div class="panel-title">Thông số chiến lược</div>
        <div class="field"><label>Coin / Symbol</label><input type="text" id="coin" value="TRBUSDT"></div>
        <div class="row2">
          <div class="field"><label>Balance (USDT)</label><input type="number" id="balance" value="300" min="1"></div>
          <div class="field"><label>Budget (USDT)</label><input type="number" id="budget" value="100" min="1"></div>
        </div>
        <div class="row2">
          <div class="field"><label>Đòn bẩy (x)</label><input type="number" id="leverage" value="15" min="1" max="125"></div>
          <div class="field"><label>Entry 1 Long</label><input type="number" id="entry1" value="22" step="0.0001"></div>
        </div>
        <div class="row2">
          <div class="field"><label>% Giảm / bước</label><input type="number" id="pct_drop" value="5" step="0.1" min="0.1"></div>
          <div class="field"><label>Nhân size / bước</label><input type="number" id="size_mult" value="2" step="0.5" min="1"></div>
        </div>
        <div class="row2">
          <div class="field"><label>Số DCA Long</label><input type="number" id="n_long" value="5" min="1" max="10"></div>
          <div class="field"><label>Số DCA Short</label><input type="number" id="n_short" value="4" min="1" max="10"></div>
        </div>
        <div class="row2">
          <div class="field"><label>Short offset (%)</label><input type="number" id="short_offset" value="2.5" step="0.1" min="0"></div>
          <div class="field"><label>Phí giao dịch (%)</label><input type="number" id="fee_rate" value="0.04" step="0.01" min="0"></div>
        </div>
        <button class="btn-run" onclick="calculate()">▶ TÍNH TOÁN</button>
      </div>
    </div>

    <div id="results" style="display:none;">
      <div class="stat-grid" id="stat-row"></div>
      <div class="panel">
        <div class="tabs">
          <button class="tab active" onclick="switchTab('entries')">Lệnh vào</button>
          <button class="tab" onclick="switchTab('sim')">Mô phỏng giá</button>
          <button class="tab" onclick="switchTab('chart')">Biểu đồ PnL</button>
          <button class="tab" onclick="switchTab('risk')">Rủi ro</button>
        </div>

        <div class="tab-content active" id="tab-entries">
          <div class="table-toolbar">
            <span class="toolbar-label">Lệnh khớp:</span>
            <button class="btn-tb all" onclick="selectAll()">✓ Chọn tất cả</button>
            <button class="btn-tb none" onclick="selectNone()">✕ Bỏ chọn tất cả</button>
            <button class="btn-tb long-only" onclick="selectLongOnly()">Long only</button>
            <button class="btn-tb short-only" onclick="selectShortOnly()">Short only</button>
            <span class="fill-count" id="fill-count"></span>
          </div>
          <table id="entry-table"></table>
        </div>

        <div class="tab-content" id="tab-sim">
          <div class="sim-controls">
            <label>Giá exit:</label>
            <input type="number" id="sim-price" step="0.0001" placeholder="Nhập giá...">
            <button class="btn-sim" onclick="simulate()">Tính PnL</button>
          </div>
          <div id="sim-result"></div>
        </div>

        <div class="tab-content" id="tab-chart">
          <div class="chart-wrap"><canvas id="canvas-pnl"></canvas></div>
          <div id="chart-legend" style="display:flex;gap:16px;margin-top:10px;font-size:11px;color:var(--muted2)"></div>
        </div>

        <div class="tab-content" id="tab-risk">
          <div id="risk-content"></div>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script>
let state = null;
let pnlChart = null;
let filled = []; // filled[i]: true = lệnh khớp

function fmt(n, dec=2) { return (n>=0?'':'-') + Math.abs(n).toFixed(dec); }

function calcDCA(e1, n, leverage, budget, pct_drop, size_mult, offset_pct) {
  const series = Array.from({length:n},(_,i)=>Math.pow(size_mult,i));
  const sumS = series.reduce((a,b)=>a+b,0);
  const base = budget / (2 * sumS);
  const actualBase = offset_pct === 0 ? base : base / 2;
  const feeRate = parseFloat(document.getElementById('fee_rate').value) / 100;
  const prices=[], sizes=[], kls=[], coins=[];
  for (let i=0;i<n;i++) {
    const p = e1 * (1-offset_pct/100) * Math.pow(1-pct_drop/100, i);
    const s = actualBase * Math.pow(size_mult, i);
    const kl = s * leverage;
    prices.push(p); sizes.push(s); kls.push(kl); coins.push(kl/p);
  }
  const totalKl=kls.reduce((a,b)=>a+b,0), totalCoins=coins.reduce((a,b)=>a+b,0);
  const newEntry=totalKl/totalCoins, liq=newEntry - budget/totalCoins;
  return {prices,sizes,kls,coins,totalKl,totalCoins,newEntry,liq,fee:totalKl*feeRate,feeRate};
}

function getFilledSummary() {
  if (!state) return {lf:null,sf:null,liLong:[],liShort:[]};
  const {long,short,n_long,n_short,budget,leverage} = state;
  const feeRate = long.feeRate;

  function agg(src, indices) {
    if (!indices.length) return null;
    const totalKl = indices.reduce((a,i)=>a+src.kls[i],0);
    const totalCoins = indices.reduce((a,i)=>a+src.coins[i],0);
    const newEntry = totalKl/totalCoins;
    const liq = newEntry - budget/totalCoins;
    return {totalKl, totalCoins, newEntry, liq, fee: totalKl*feeRate, indices};
  }

  const liLong = Array.from({length:n_long},(_,i)=>i).filter(i=>filled[i]);
  const liShort = Array.from({length:n_short},(_,i)=>i).filter(i=>filled[n_long+i]);
  return {lf: agg(long,liLong), sf: agg(short,liShort), liLong, liShort};
}

function calculate() {
  const coin = document.getElementById('coin').value||'SYMBOL';
  const balance = +document.getElementById('balance').value;
  const budget = +document.getElementById('budget').value;
  const leverage = +document.getElementById('leverage').value;
  const e1 = +document.getElementById('entry1').value;
  const pct_drop = +document.getElementById('pct_drop').value;
  const n_long = +document.getElementById('n_long').value;
  const n_short = +document.getElementById('n_short').value;
  const short_offset = +document.getElementById('short_offset').value;
  const size_mult = +document.getElementById('size_mult').value;

  const long = calcDCA(e1,n_long,leverage,budget,pct_drop,size_mult,0);
  const short = calcDCA(e1,n_short,leverage,budget,pct_drop,size_mult,short_offset);
  state = {coin,balance,budget,leverage,e1,pct_drop,n_long,n_short,long,short,size_mult};
  filled = new Array(n_long+n_short).fill(true);

  document.getElementById('results').style.display='block';
  document.getElementById('sim-price').value = e1;
  renderTable();
  updateStats();
  drawChart();
}

function renderTable() {
  const {long,short,n_long,n_short} = state;
  const {lf,sf,liLong,liShort} = getFilledSummary();

  let h = `<tr>
    <th title="Tick = lệnh đã khớp">Khớp</th>
    <th>Lệnh</th><th>Giá vào</th><th>Size USDT</th>
    <th>KL USDT</th><th>KL Coin</th><th>KL tích lũy</th>
  </tr>`;

  // Long
  let cumKl=0;
  for (let i=0;i<n_long;i++) {
    const idx=i, on=filled[idx];
    if (on) cumKl+=long.kls[i];
    const rc = on ? 'row-filled-long' : 'row-unfilled';
    const cc = on ? 'chk-box on-long' : 'chk-box';
    const tick = on
      ? `<svg width="11" height="11" viewBox="0 0 11 11"><polyline points="1.5,5.5 4.2,8.5 9.5,2" stroke="#00e5a0" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/></svg>`
      : '';
    h += `<tr class="${rc}" id="row-${idx}">
      <td><div class="chk"><div class="${cc}" onclick="toggleFill(${idx})" title="Click để đánh dấu khớp/bỏ khớp">${tick}</div></div></td>
      <td>Long ${i+1} <span class="tag tag-l">L</span></td>
      <td>${long.prices[i].toFixed(6)}</td>
      <td>${long.sizes[i].toFixed(4)}</td>
      <td>${long.kls[i].toFixed(4)}</td>
      <td>${long.coins[i].toFixed(6)}</td>
      <td>${on ? cumKl.toFixed(2) : '—'}</td>
    </tr>`;
  }

  h += `<tr><td colspan="7" style="padding:3px;border-bottom:1px solid var(--border)"></td></tr>`;

  // Short
  cumKl=0;
  for (let i=0;i<n_short;i++) {
    const idx=n_long+i, on=filled[idx];
    if (on) cumKl+=short.kls[i];
    const rc = on ? 'row-filled-short' : 'row-unfilled';
    const cc = on ? 'chk-box on-short' : 'chk-box';
    const tick = on
      ? `<svg width="11" height="11" viewBox="0 0 11 11"><polyline points="1.5,5.5 4.2,8.5 9.5,2" stroke="#ff4d6a" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/></svg>`
      : '';
    h += `<tr class="${rc}" id="row-${idx}">
      <td><div class="chk"><div class="${cc}" onclick="toggleFill(${idx})" title="Click để đánh dấu khớp/bỏ khớp">${tick}</div></div></td>
      <td>Short ${i+1} <span class="tag tag-s">S</span></td>
      <td>${short.prices[i].toFixed(6)}</td>
      <td>${short.sizes[i].toFixed(4)}</td>
      <td>${short.kls[i].toFixed(4)}</td>
      <td>${short.coins[i].toFixed(6)}</td>
      <td>${on ? cumKl.toFixed(2) : '—'}</td>
    </tr>`;
  }

  // Totals
  const lSizeSum = lf ? liLong.reduce((a,i)=>a+long.sizes[i],0) : 0;
  const sSizeSum = sf ? liShort.reduce((a,i)=>a+short.sizes[i],0) : 0;
  h += `
    <tr class="row-total">
      <td></td>
      <td style="color:var(--green)">Long (đã khớp: ${liLong.length}/${n_long})</td>
      <td>—</td>
      <td>${lf ? lSizeSum.toFixed(4) : '—'}</td>
      <td>${lf ? lf.totalKl.toFixed(4) : '—'}</td>
      <td>${lf ? lf.totalCoins.toFixed(6) : '—'}</td>
      <td>${lf ? lf.totalKl.toFixed(2) : '—'}</td>
    </tr>
    <tr class="row-total">
      <td></td>
      <td style="color:var(--red)">Short (đã khớp: ${liShort.length}/${n_short})</td>
      <td>—</td>
      <td>${sf ? sSizeSum.toFixed(4) : '—'}</td>
      <td>${sf ? sf.totalKl.toFixed(4) : '—'}</td>
      <td>${sf ? sf.totalCoins.toFixed(6) : '—'}</td>
      <td>${sf ? sf.totalKl.toFixed(2) : '—'}</td>
    </tr>`;

  document.getElementById('entry-table').innerHTML = h;

  const totalF = filled.filter(Boolean).length;
  const nL = filled.slice(0,n_long).filter(Boolean).length;
  const nS = filled.slice(n_long).filter(Boolean).length;
  document.getElementById('fill-count').innerHTML =
    `Đã khớp: <span>${nL} Long + ${nS} Short</span> / ${n_long+n_short} lệnh`;
}

function toggleFill(idx) {
  filled[idx] = !filled[idx];
  renderTable(); updateStats();
  if (document.getElementById('tab-chart').classList.contains('active')) drawChart();
  if (document.getElementById('sim-result').innerHTML.trim()!=='') simulate();
}

function selectAll()       { filled=new Array(state.n_long+state.n_short).fill(true);  afterSelect(); }
function selectNone()      { filled=new Array(state.n_long+state.n_short).fill(false); afterSelect(); }
function selectLongOnly()  { filled=filled.map((_,i)=>i<state.n_long);                afterSelect(); }
function selectShortOnly() { filled=filled.map((_,i)=>i>=state.n_long);               afterSelect(); }
function afterSelect() {
  renderTable(); updateStats();
  if (document.getElementById('tab-chart').classList.contains('active')) drawChart();
  if (document.getElementById('sim-result').innerHTML.trim()!=='') simulate();
}

function updateStats() {
  const {lf,sf,liLong} = getFilledSummary();
  const {long,e1} = state;
  const firstLongPrice = liLong.length ? long.prices[liLong[0]] : e1;
  const liqDropPct = lf ? ((firstLongPrice - lf.liq) / firstLongPrice * 100) : 0;

  document.getElementById('stat-row').innerHTML = `
    <div class="stat">
      <div class="lbl">New Entry Long</div>
      <div class="val b">${lf ? lf.newEntry.toFixed(4) : '<span style="color:var(--muted);font-size:13px">—</span>'}</div>
      <div class="sub-val">${lf ? lf.totalCoins.toFixed(4)+' coin' : 'chưa có lệnh'}</div>
    </div>
    <div class="stat">
      <div class="lbl">New Entry Short</div>
      <div class="val a">${sf ? sf.newEntry.toFixed(4) : '<span style="color:var(--muted);font-size:13px">—</span>'}</div>
      <div class="sub-val">${sf ? sf.totalCoins.toFixed(4)+' coin' : 'chưa có lệnh'}</div>
    </div>
    <div class="stat">
      <div class="lbl">Liq Long</div>
      <div class="val r">${lf ? lf.liq.toFixed(4) : '<span style="color:var(--muted);font-size:13px">—</span>'}</div>
      <div class="sub-val">${lf ? 'giảm '+liqDropPct.toFixed(1)+'%' : ''}</div>
    </div>
    <div class="stat">
      <div class="lbl">Tổng KL khớp</div>
      <div class="val">${((lf?lf.totalKl:0)+(sf?sf.totalKl:0)).toFixed(2)}</div>
      <div class="sub-val">USDT position</div>
    </div>`;

  updateRisk(lf, sf);
}

function updateRisk(lf, sf) {
  const {balance,leverage,size_mult} = state;
  const mL = lf ? lf.totalKl/leverage : 0;
  const mS = sf ? sf.totalKl/leverage : 0;
  const mT = mL+mS;
  const rp = mT/balance*100;
  const liqPct = lf ? ((lf.newEntry-lf.liq)/lf.newEntry*100) : 0;

  document.getElementById('risk-content').innerHTML = `
    <div class="result-box">
      <div class="result-row"><span class="k">Margin Long (đã khớp)</span><span class="v b">${mL.toFixed(2)} USDT</span></div>
      <div class="result-row"><span class="k">Margin Short (đã khớp)</span><span class="v a">${mS.toFixed(2)} USDT</span></div>
      <div class="result-row"><span class="k">Tổng Margin sử dụng</span><span class="v">${mT.toFixed(2)} USDT</span></div>
      <div class="result-row"><span class="k">% Balance sử dụng</span><span class="v ${rp>80?'r':rp>50?'a':'g'}">${rp.toFixed(1)}%</span></div>
      <div class="result-row"><span class="k">Giá thanh lý Long</span><span class="v r">${lf?lf.liq.toFixed(6):'—'}</span></div>
      <div class="result-row"><span class="k">% giảm đến liq (từ new entry)</span><span class="v r">${lf?'-'+liqPct.toFixed(2)+'%':'—'}</span></div>
      <div class="result-row"><span class="k">Phí Long</span><span class="v a">${lf?lf.fee.toFixed(4):'0.0000'} USDT</span></div>
      <div class="result-row"><span class="k">Phí Short</span><span class="v a">${sf?sf.fee.toFixed(4):'0.0000'} USDT</span></div>
      <div class="result-row"><span class="k">Tổng phí</span><span class="v a">${((lf?lf.fee:0)+(sf?sf.fee:0)).toFixed(4)} USDT</span></div>
    </div>
    ${rp>80?`<div class="warn liq-warn" style="margin-top:10px">⚠ Margin vượt 80% balance — rủi ro thanh lý rất cao!</div>`:''}
    ${lf&&liqPct<15?`<div class="warn liq-warn" style="margin-top:8px">⚠ Khoảng cách đến liq chỉ ${liqPct.toFixed(1)}% — nên giảm đòn bẩy.</div>`:''}
    <div class="warn" style="margin-top:8px">ℹ Martingale x${size_mult}: size tăng theo lũy thừa. Tổng exposure tăng mạnh khi vào nhiều lệnh.</div>`;
}

function simulate() {
  if (!state) return;
  const exitPrice = parseFloat(document.getElementById('sim-price').value);
  if (isNaN(exitPrice)||exitPrice<=0) return;
  const {balance,leverage} = state;
  const {lf,sf,liLong,liShort} = getFilledSummary();

  if (!lf && !sf) {
    document.getElementById('sim-result').innerHTML =
      `<div class="empty-msg">⬅ Chưa có lệnh nào được tick khớp.<br>Hãy tick ít nhất 1 lệnh trong tab "Lệnh vào".</div>`;
    return;
  }

  const plRaw  = lf ? (exitPrice - lf.newEntry) * lf.totalCoins : 0;
  const plNet  = lf ? plRaw  - lf.fee : 0;
  const psRaw  = sf ? (sf.newEntry - exitPrice) * sf.totalCoins : 0;
  const psNet  = sf ? psRaw - sf.fee : 0;
  const total  = plNet + psNet;
  const dw     = balance + total;
  const rorL   = lf ? plNet/(lf.totalKl/leverage)*100 : 0;
  const rorS   = sf ? psNet/(sf.totalKl/leverage)*100 : 0;
  const liqHit = lf && exitPrice <= lf.liq;

  document.getElementById('sim-result').innerHTML = `
    <div class="result-box">
      <div class="result-row">
        <span class="k">Giá exit</span>
        <span class="v b">${exitPrice.toFixed(6)}</span>
      </div>
      <div class="result-row">
        <span class="k" style="color:var(--muted)">Lệnh tính</span>
        <span style="font-size:11px">
          ${liLong.length ? `<span style="color:var(--green)">${liLong.length} Long</span>` : ''}
          ${liLong.length&&liShort.length?' + ':''}
          ${liShort.length ? `<span style="color:var(--red)">${liShort.length} Short</span>` : ''}
        </span>
      </div>
      <div class="sep"></div>
      ${lf ? `
        <div class="result-row"><span class="k">PnL Long (trước phí)</span><span class="v ${plRaw>=0?'g':'r'}">${fmt(plRaw)} USDT</span></div>
        <div class="result-row"><span class="k">PnL Long (sau phí)</span><span class="v ${plNet>=0?'g':'r'}">${fmt(plNet)} USDT <span style="font-size:11px;opacity:.7">(${fmt(rorL,1)}%)</span></span></div>
      ` : `<div class="result-row"><span class="k">Long</span><span style="color:var(--muted);font-size:11px">không có lệnh khớp</span></div>`}
      <div class="sep"></div>
      ${sf ? `
        <div class="result-row"><span class="k">PnL Short (trước phí)</span><span class="v ${psRaw>=0?'g':'r'}">${fmt(psRaw)} USDT</span></div>
        <div class="result-row"><span class="k">PnL Short (sau phí)</span><span class="v ${psNet>=0?'g':'r'}">${fmt(psNet)} USDT <span style="font-size:11px;opacity:.7">(${fmt(rorS,1)}%)</span></span></div>
      ` : `<div class="result-row"><span class="k">Short</span><span style="color:var(--muted);font-size:11px">không có lệnh khớp</span></div>`}
      <div class="sep"></div>
      <div class="result-row">
        <span class="k" style="font-size:13px;color:var(--text);font-weight:700">TỔNG LÃI / LỖ</span>
        <span style="font-size:20px;font-weight:700;color:${total>=0?'var(--green)':'var(--red)'}">${fmt(total)} USDT</span>
      </div>
      <div class="result-row"><span class="k">Dư ví sau giao dịch</span><span class="v ${dw>=0?'g':'r'}">${fmt(dw)} USDT</span></div>
      <div class="result-row"><span class="k">Tổng phí đã trả</span><span class="v a">${fmt((lf?lf.fee:0)+(sf?sf.fee:0),4)} USDT</span></div>
    </div>
    ${liqHit?`<div class="warn liq-warn">⚠ Giá ${exitPrice.toFixed(4)} ≤ Liq Long (${lf.liq.toFixed(4)}) → LONG bị thanh lý!</div>`:''}`;
}

function drawChart() {
  if (!state) return;
  const {e1} = state;
  const {lf,sf} = getFilledSummary();

  if (!lf && !sf) {
    if (pnlChart) { pnlChart.destroy(); pnlChart=null; }
    document.getElementById('chart-legend').innerHTML =
      `<span style="color:var(--muted);font-size:12px">Tick ít nhất 1 lệnh để xem biểu đồ.</span>`;
    return;
  }

  const refLiq  = lf ? lf.liq : (sf?sf.newEntry*0.5:e1*0.5);
  const priceMin = Math.max(refLiq*0.6, 0.0001);
  const priceMax = e1 * 1.35;
  const steps = 120;
  const labels=[], ldArr=[], sdArr=[], tdArr=[];

  for (let i=0;i<=steps;i++) {
    const p = priceMin + (priceMax-priceMin)*i/steps;
    labels.push(p.toFixed(4));
    const pl = lf ? (p-lf.newEntry)*lf.totalCoins - lf.fee : 0;
    const ps = sf ? (sf.newEntry-p)*sf.totalCoins - sf.fee : 0;
    if (lf) ldArr.push(+pl.toFixed(2));
    if (sf) sdArr.push(+ps.toFixed(2));
    tdArr.push(+(pl+ps).toFixed(2));
  }

  const ctx = document.getElementById('canvas-pnl').getContext('2d');
  if (pnlChart) pnlChart.destroy();

  const datasets = [];
  if (lf) datasets.push({label:'Long PnL', data:ldArr, borderColor:'#00e5a0', borderWidth:1.5, pointRadius:0, tension:0.3});
  if (sf) datasets.push({label:'Short PnL', data:sdArr, borderColor:'#ff4d6a', borderWidth:1.5, pointRadius:0, tension:0.3});
  if (lf&&sf) datasets.push({label:'Tổng PnL', data:tdArr, borderColor:'#4d9fff', borderWidth:2.5, pointRadius:0, tension:0.3, borderDash:[5,3]});

  pnlChart = new Chart(ctx, {
    type:'line', data:{labels,datasets},
    options:{
      responsive:true, maintainAspectRatio:false,
      plugins:{
        legend:{display:false},
        tooltip:{mode:'index',intersect:false,
          callbacks:{title:i=>`Giá: ${i[0].label}`, label:c=>` ${c.dataset.label}: ${c.raw.toFixed(2)} USDT`}}
      },
      scales:{
        x:{ticks:{color:'#5a6070',font:{size:10,family:'JetBrains Mono'},maxTicksLimit:12},grid:{color:'rgba(255,255,255,0.04)'}},
        y:{ticks:{color:'#5a6070',font:{size:10,family:'JetBrains Mono'},callback:v=>v.toFixed(0)},grid:{color:'rgba(255,255,255,0.06)'}}
      }
    }
  });

  const legItems=[];
  if (lf) legItems.push(`<span style="display:flex;align-items:center;gap:5px"><span style="width:16px;height:2px;background:#00e5a0;display:inline-block"></span>Long PnL</span>`);
  if (sf) legItems.push(`<span style="display:flex;align-items:center;gap:5px"><span style="width:16px;height:2px;background:#ff4d6a;display:inline-block"></span>Short PnL</span>`);
  if (lf&&sf) legItems.push(`<span style="display:flex;align-items:center;gap:5px"><span style="width:16px;height:2px;background:#4d9fff;display:inline-block"></span>Tổng PnL</span>`);
  document.getElementById('chart-legend').innerHTML = legItems.join('');
}

function switchTab(name) {
  const names=['entries','sim','chart','risk'];
  document.querySelectorAll('.tab').forEach((t,i)=>t.classList.toggle('active',names[i]===name));
  document.querySelectorAll('.tab-content').forEach(c=>c.classList.remove('active'));
  document.getElementById('tab-'+name).classList.add('active');
  if (name==='chart') setTimeout(drawChart,50);
}

window.onload = () => calculate();
</script>
</body>
</html>
